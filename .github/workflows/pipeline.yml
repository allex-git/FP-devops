name: pipeline

on:
  push:
    branches:
      - main

jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: check python syntax
        run: python -m py_compile $(git ls-files '*.py')

      - name: dockerfile lint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          failure-threshold: error   # ← ВАЖНО

      - name: scan secrets
        uses: trufflesecurity/trufflehog@main

  build:
    runs-on: ubuntu-latest
    needs: lint

    outputs:
      tag: ${{ steps.vars.outputs.TAG }}

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: generate commit sha
        id: vars
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: build image (no push)
        run: docker build -t test-image:${{ steps.vars.outputs.TAG }} .

  scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: set up docker
        uses: docker/setup-buildx-action@v3

      - name: build image again
        run: docker build -t test-image:${{ needs.build.outputs.tag }} .

      - name: scan docker image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: test-image:${{ needs.build.outputs.tag }}
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

  push:
    runs-on: ubuntu-latest
    needs: scan

    outputs:
      tag: ${{ steps.vars.outputs.TAG }}

    permissions:
      contents: write

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: generate commit sha
        id: vars
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: build and push docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/final-project:${{ steps.vars.outputs.TAG }}

  update:
    runs-on: ubuntu-latest
    needs: push

    permissions:
      contents: write

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: update deployment.yaml
        run: |
          sed -i 's|image: .*|image: '"${{ secrets.DOCKERHUB_USERNAME }}/final-project:${{ needs.push.outputs.tag }}"'|' kubernetes/deployment.yaml

      - name: commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add kubernetes/deployment.yaml
          git commit -m "update image tag to ${{ needs.push.outputs.tag }}" || echo "no change"
          git push